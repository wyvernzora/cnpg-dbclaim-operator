# Scenario A: a single app owns a database. Sugar form on RoleClaim.
---
apiVersion: cnpg.wyvernzora.io/v1alpha1
kind: DatabaseClaim
metadata:
  name: orders
  namespace: app-team-a
spec:
  databaseName: orders
  clusterRef:
    name: shared-pg
    namespace: cnpg-system
  schemas:
    - app
  extensions:
    - pgcrypto
  deletionPolicy: Retain
---
apiVersion: cnpg.wyvernzora.io/v1alpha1
kind: RoleClaim
metadata:
  name: orders-owner
  namespace: app-team-a
spec:
  databaseClaimRef:
    name: orders
  roleName: orders_owner
  access: Owner
---
apiVersion: cnpg.wyvernzora.io/v1alpha1
kind: RoleClaim
metadata:
  name: orders-rw
  namespace: app-team-a
spec:
  databaseClaimRef:
    name: orders
  roleName: orders_rw
  access: ReadWrite
---
apiVersion: cnpg.wyvernzora.io/v1alpha1
kind: RoleClaim
metadata:
  name: orders-ro
  namespace: app-team-a
spec:
  databaseClaimRef:
    name: orders
  roleName: orders_ro
  access: ReadOnly
