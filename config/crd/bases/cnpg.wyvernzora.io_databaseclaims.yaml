---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: databaseclaims.cnpg.wyvernzora.io
spec:
  group: cnpg.wyvernzora.io
  names:
    categories:
    - cnpg
    kind: DatabaseClaim
    listKind: DatabaseClaimList
    plural: databaseclaims
    shortNames:
    - dbclaim
    - dbclaims
    singular: databaseclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DatabaseClaim provisions a Postgres database in a CNPG cluster on behalf of
          an application namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseClaimSpec defines the desired state of DatabaseClaim.
            properties:
              clusterRef:
                description: |-
                  ClusterRef points at the CNPG Cluster that will host this database.
                  Immutable.
                properties:
                  name:
                    description: Name of the CNPG Cluster resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the CNPG Cluster resource. May differ from the namespace of
                      the DatabaseClaim itself.
                    minLength: 1
                    type: string
                required:
                - name
                - namespace
                type: object
              databaseName:
                description: DatabaseName is the Postgres database name to provision.
                  Immutable.
                pattern: ^[a-z][a-z0-9_]{0,62}$
                type: string
                x-kubernetes-validations:
                - message: reserved database name
                  rule: self != 'postgres' && self != 'template0' && self != 'template1'
              deletionPolicy:
                default: Retain
                description: |-
                  DeletionPolicy controls the behaviour of DatabaseClaim deletion. Retain
                  (default) blocks deletion while RoleClaims reference this claim; Delete
                  cascades through referencing RoleClaims and then drops the database.
                enum:
                - Retain
                - Delete
                type: string
              extensions:
                description: |-
                  Extensions to install in the database. Forwarded to the peer CNPG
                  Database CR for reconciliation.
                items:
                  pattern: ^[a-z_][a-z0-9_]{0,62}$
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              schemas:
                description: |-
                  Schemas to ensure in the database. Forwarded to the peer CNPG Database
                  CR; CNPG creates them with ownership initially set to the bootstrap
                  owner. Ownership transfer happens when a matching Owner RoleClaim
                  reconciles.
                items:
                  pattern: ^[a-z_][a-z0-9_]{0,62}$
                  type: string
                type: array
                x-kubernetes-list-type: set
            required:
            - clusterRef
            - databaseName
            type: object
            x-kubernetes-validations:
            - message: databaseName is immutable
              rule: self.databaseName == oldSelf.databaseName
            - message: clusterRef is immutable
              rule: self.clusterRef == oldSelf.clusterRef
          status:
            description: DatabaseClaimStatus defines the observed state of DatabaseClaim.
            properties:
              conditions:
                description: |-
                  Conditions is the authoritative status surface. Standard types include
                  Ready, ClusterResolved, and DatabaseReady.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              databaseInfo:
                description: DatabaseInfo carries connection coordinates once the
                  database is Ready.
                properties:
                  dbname:
                    type: string
                  host:
                    type: string
                  port:
                    format: int32
                    type: integer
                type: object
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a derived, human-readable summary of conditions.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Terminating
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
