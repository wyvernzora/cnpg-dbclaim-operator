{{- if .Values.installCRDs -}}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    helm.sh/resource-policy: keep
  name: roleclaims.cnpg.wyvernzora.io
spec:
  group: cnpg.wyvernzora.io
  names:
    categories:
    - cnpg
    kind: RoleClaim
    listKind: RoleClaimList
    plural: roleclaims
    shortNames:
    - roleclaim
    - roleclaims
    singular: roleclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseClaimRef.name
      name: Database
      type: string
    - jsonPath: .status.roleName
      name: Role
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RoleClaim provisions a Postgres role with a permission profile against a
          DatabaseClaim in the same namespace, and emits a Secret with the role's
          credentials.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RoleClaimSpec defines the desired state of RoleClaim.

              Exactly one of spec.access (sugar — applies to all schemas declared on the
              DatabaseClaim) or spec.schemas (per-schema scoping) MUST be set.
            properties:
              access:
                description: |-
                  Access is the simple form: a single access level applied to every schema
                  declared on the referenced DatabaseClaim. Mutually exclusive with
                  spec.schemas. When set to Owner, the role is also granted ownership of
                  the database itself (ALTER DATABASE OWNER TO).
                enum:
                - Owner
                - ReadWrite
                - ReadOnly
                type: string
              connectionLimit:
                description: |-
                  ConnectionLimit sets the Postgres role's CONNECTION LIMIT. If unset,
                  the role's connection count is unlimited (CONNECTION LIMIT -1).
                format: int32
                minimum: -1
                type: integer
              databaseClaimRef:
                description: |-
                  DatabaseClaimRef points at the DatabaseClaim this role belongs to.
                  Same-namespace only. Immutable.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              roleName:
                description: |-
                  RoleName is the Postgres role name this claim manages. Required and
                  immutable: K8s resource names commonly contain '-', which is invalid
                  in Postgres identifiers, so a default derived from the K8s name is
                  unsafe. Set this explicitly to a pattern-safe identifier.
                pattern: ^[a-z][a-z0-9_]{0,62}$
                type: string
              schemas:
                description: |-
                  Schemas is the per-schema form. A list of (schema, access) entries.
                  Mutually exclusive with spec.access. Use this for bounded-context
                  scenarios where multiple services share a database with different
                  permissions on different schemas. Access changes revoke and reapply
                  grants, but ownership transfers are not automatically reversed.
                items:
                  description: SchemaGrant pairs a schema name with an access level.
                  properties:
                    access:
                      description: Access level applied to this schema.
                      enum:
                      - Owner
                      - ReadWrite
                      - ReadOnly
                      type: string
                    name:
                      description: |-
                        Name of the schema. Must be declared in the referenced DatabaseClaim's
                        spec.schemas (otherwise reconcile fails with Reason=UnknownSchema).
                      pattern: ^[a-z_][a-z0-9_]{0,62}$
                      type: string
                  required:
                  - access
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - databaseClaimRef
            - roleName
            type: object
            x-kubernetes-validations:
            - message: exactly one of spec.access or spec.schemas must be set
              rule: '(has(self.access) ? 1 : 0) + (has(self.schemas) ? 1 : 0) == 1'
            - message: databaseClaimRef is immutable
              rule: self.databaseClaimRef == oldSelf.databaseClaimRef
            - message: access is immutable once set and cannot be added after creation
              rule: '(has(oldSelf.access) ? has(self.access) && self.access == oldSelf.access
                : !has(self.access))'
            - message: roleName is immutable
              rule: self.roleName == oldSelf.roleName
          status:
            description: RoleClaimStatus defines the observed state of RoleClaim.
            properties:
              appliedDefaultPrivileges:
                description: |-
                  AppliedDefaultPrivileges records the (writer, schema, access) tuples for
                  which this RoleClaim's role currently holds default privileges. The
                  reconciler diffs against this list each pass: tuples no longer in the
                  intended universe are revoked via ALTER DEFAULT PRIVILEGES ... REVOKE.
                items:
                  description: |-
                    DefaultPrivilegeGrant is one (writer-role, schema, access) tuple on which
                    this RoleClaim's role has been granted default privileges via ALTER DEFAULT
                    PRIVILEGES. Tracked in status so a narrowing reconcile can revoke the diff.
                  properties:
                    access:
                      description: |-
                        Access is the privilege profile applied to future objects. Empty means
                        ReadOnly for compatibility with status written by older operator
                        versions.
                      enum:
                      - Owner
                      - ReadWrite
                      - ReadOnly
                      type: string
                    schema:
                      description: Schema is the schema scope of the default-privilege
                        grant.
                      type: string
                    writer:
                      description: |-
                        Writer is the Postgres role whose future objects this claim's role
                        receives privileges on.
                      type: string
                  required:
                  - schema
                  - writer
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - writer
                - schema
                x-kubernetes-list-type: map
              conditions:
                description: |-
                  Conditions is the authoritative status surface. Standard types include
                  Ready, DatabaseClaimResolved, RoleReady, SecretReady.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              credentialsSecretName:
                description: |-
                  CredentialsSecretName is the name of the Secret in the same namespace
                  that holds the role's credentials.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a derived, human-readable summary of conditions.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Terminating
                type: string
              resolvedSchemas:
                description: |-
                  ResolvedSchemas echoes the (schema, access) tuples that were applied,
                  regardless of whether spec.access (sugar) or spec.schemas was used.
                items:
                  description: SchemaGrant pairs a schema name with an access level.
                  properties:
                    access:
                      description: Access level applied to this schema.
                      enum:
                      - Owner
                      - ReadWrite
                      - ReadOnly
                      type: string
                    name:
                      description: |-
                        Name of the schema. Must be declared in the referenced DatabaseClaim's
                        spec.schemas (otherwise reconcile fails with Reason=UnknownSchema).
                      pattern: ^[a-z_][a-z0-9_]{0,62}$
                      type: string
                  required:
                  - access
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              roleName:
                description: RoleName is the resolved Postgres role name.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
