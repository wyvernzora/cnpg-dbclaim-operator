{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dbclaim-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dbclaim-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metrics.serviceType }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "dbclaim-operator.selectorLabels" . | nindent 4 }}
{{- end }}
