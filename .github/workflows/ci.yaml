name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: read

jobs:
  trust-gate:
    runs-on: ubuntu-latest
    outputs:
      trusted: ${{ steps.gate.outputs.trusted }}
    steps:
      - id: gate
        env:
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
            echo "Trusted because this is a $EVENT_NAME event."
            exit 0
          fi

          trusted=false
          reason="PR author, triggering actor, and current head approval status are not trusted"
          triggering_actor_permission="$(gh api "repos/$REPOSITORY/collaborators/$TRIGGERING_ACTOR/permission" --jq .permission 2>/dev/null || echo none)"
          ok_to_test_status="$(gh api "repos/$REPOSITORY/commits/$PR_HEAD_SHA/status" --jq 'any(.statuses[]; .context == "ok-to-test" and .state == "success")' 2>/dev/null || echo false)"

          if [ "$PR_AUTHOR" = "renovate[bot]" ] && [ "$HEAD_REPO" = "$REPOSITORY" ]; then
            trusted=true
            reason="Renovate same-repository PR"
          elif [ "$AUTHOR_ASSOCIATION" = "OWNER" ] || [ "$AUTHOR_ASSOCIATION" = "MEMBER" ] || [ "$AUTHOR_ASSOCIATION" = "COLLABORATOR" ]; then
            trusted=true
            reason="PR author association is $AUTHOR_ASSOCIATION"
          elif [ "$triggering_actor_permission" = "admin" ] || [ "$triggering_actor_permission" = "maintain" ] || [ "$triggering_actor_permission" = "write" ]; then
            trusted=true
            reason="Workflow was triggered by $TRIGGERING_ACTOR ($triggering_actor_permission)"
          elif [ "$ok_to_test_status" = "true" ]; then
            trusted=true
            reason="Current PR head has ok-to-test approval status"
          fi

          echo "trusted=$trusted" >> "$GITHUB_OUTPUT"
          echo "$reason"

          if [ "$trusted" != "true" ]; then
            echo "::error::Untrusted PR. A maintainer must re-run the workflow or add ok-to-test for this head commit."
            exit 1
          fi

  generated:
    needs: trust-gate
    if: needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make manifests generate
      - name: Verify generated files are committed
        run: |
          paths=(
            api/v1alpha1/zz_generated.deepcopy.go
            config/crd/bases
            config/rbac
            charts/dbclaim-operator/templates/crds
          )
          if ! git diff --quiet -- "${paths[@]}"; then
            echo "::error::Generated API, CRD, or RBAC files are stale. Run 'make manifests generate' and commit the result."
            git diff -- "${paths[@]}"
            exit 1
          fi

  crd-rbac-diff:
    needs: trust-gate
    if: github.event_name == 'pull_request' && needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Post CRD/RBAC diff comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          paths=(
            config/crd/bases
            config/rbac
            charts/dbclaim-operator/templates/crds
          )
          marker="<!-- cnpg-dbclaim-crd-rbac-diff -->"
          find_comment() {
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" |
              head -n 1 || true
          }

          if git diff --quiet "$BASE_SHA...HEAD" -- "${paths[@]}"; then
            comment_id="$(find_comment)"
            if [ -n "$comment_id" ]; then
              gh api --method DELETE "repos/$REPO/issues/comments/$comment_id" >/dev/null || \
                echo "::warning::Unable to delete stale CRD/RBAC diff comment."
            fi
            echo "No CRD/RBAC diff against $BASE_REF."
            exit 0
          fi

          diff_file="$(mktemp)"
          git diff --no-color "$BASE_SHA...HEAD" -- "${paths[@]}" > "$diff_file"

          max_bytes=60000
          truncated=""
          if [ "$(wc -c < "$diff_file")" -gt "$max_bytes" ]; then
            head -c "$max_bytes" "$diff_file" > "$diff_file.truncated"
            mv "$diff_file.truncated" "$diff_file"
            truncated=$'\n\n... diff truncated ...'
          fi

          body_file="$(mktemp)"
          {
            printf '%s\n' "$marker"
            printf '### CRD/RBAC diff against `%s`\n\n' "$BASE_REF"
            printf '<details open>\n'
            printf '<summary>Generated manifest changes</summary>\n\n'
            printf '```diff\n'
            cat "$diff_file"
            printf '%s\n' "$truncated"
            printf '```\n'
            printf '</details>\n'
          } > "$body_file"

          comment_id="$(find_comment)"
          body="$(cat "$body_file")"
          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$comment_id" -f body="$body" >/dev/null || {
              echo "::warning::Unable to update CRD/RBAC diff comment; writing diff to job summary."
              cat "$body_file" >> "$GITHUB_STEP_SUMMARY"
            }
          else
            gh api --method POST "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$body" >/dev/null || {
              echo "::warning::Unable to create CRD/RBAC diff comment; writing diff to job summary."
              cat "$body_file" >> "$GITHUB_STEP_SUMMARY"
            }
          fi

  lint:
    needs: trust-gate
    if: needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make verify-cnpg-version
      - run: make vet
      - run: make lint

  unit:
    needs: trust-gate
    if: needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test

  chart:
    needs: trust-gate
    if: needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - run: make chart-lint
      - run: make chart-template

  e2e:
    needs: trust-gate
    if: needs.trust-gate.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_REPOSITORY: cnpg-dbclaim-operator
      IMAGE_TAG: e2e
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v4
      - name: Build operator image
        run: make docker-build
      - uses: helm/kind-action@v1
        with:
          cluster_name: dbclaim-e2e
          config: hack/e2e/kind-config.yaml
          wait: 60s
      - name: Load operator image
        run: make kind-load
      - name: Install CNPG
        run: make cnpg-install
      - name: Create test Postgres cluster
        run: make cluster-up
      - name: Install dbclaim operator
        run: make operator-install
      - name: Run e2e
        run: make e2e
      - name: Dump on failure
        if: failure()
        run: bash hack/e2e/dump.sh

  e2e-stress:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      IMAGE_REPOSITORY: cnpg-dbclaim-operator
      IMAGE_TAG: e2e
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v4
      - name: Build operator image
        run: make docker-build
      - uses: helm/kind-action@v1
        with:
          cluster_name: dbclaim-e2e
          config: hack/e2e/kind-config.yaml
          wait: 60s
      - name: Load operator image
        run: make kind-load
      - name: Install CNPG
        run: make cnpg-install
      - name: Create test Postgres cluster
        run: make cluster-up
      - name: Install dbclaim operator
        run: make operator-install
      - name: Run e2e stress
        run: make e2e-stress
      - name: Dump on failure
        if: failure()
        run: bash hack/e2e/dump.sh
