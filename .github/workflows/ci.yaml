name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make verify-cnpg-version
      - run: make vet
      - run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_REPOSITORY: cnpg-dbclaim-operator
      IMAGE_TAG: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Build operator image
        run: make docker-build
      - uses: helm/kind-action@v1
        with:
          cluster_name: dbclaim-e2e
          config: hack/e2e/kind-config.yaml
          wait: 60s
      - name: Load operator image
        run: make kind-load
      - name: Install CNPG
        run: make cnpg-install
      - name: Create test Postgres cluster
        run: make cluster-up
      - name: Install dbclaim operator
        run: make operator-install
      - name: Run e2e
        run: make e2e
      - name: Dump on failure
        if: failure()
        run: bash hack/e2e/dump.sh

  e2e-stress:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      IMAGE_REPOSITORY: cnpg-dbclaim-operator
      IMAGE_TAG: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Build operator image
        run: make docker-build
      - uses: helm/kind-action@v1
        with:
          cluster_name: dbclaim-e2e
          config: hack/e2e/kind-config.yaml
          wait: 60s
      - name: Load operator image
        run: make kind-load
      - name: Install CNPG
        run: make cnpg-install
      - name: Create test Postgres cluster
        run: make cluster-up
      - name: Install dbclaim operator
        run: make operator-install
      - name: Run e2e stress
        run: make e2e-stress
      - name: Dump on failure
        if: failure()
        run: bash hack/e2e/dump.sh
