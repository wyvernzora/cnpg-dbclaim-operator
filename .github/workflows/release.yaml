name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/wyvernzora/cnpg-dbclaim-operator
  CHART_REPOSITORY: oci://ghcr.io/wyvernzora/charts

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "version must look like v0.1.0, got $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "chart_version=${version#v}" >> "$GITHUB_OUTPUT"
      - name: Verify release commit is on main with passing CI
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --force --no-tags origin \
            "+refs/tags/$VERSION:refs/tags/$VERSION" \
            +refs/heads/main:refs/remotes/origin/main

          tagged_sha="$(git rev-parse "$VERSION^{commit}")"
          if ! git merge-base --is-ancestor "$tagged_sha" origin/main; then
            echo "::error::Release tag $VERSION points to $tagged_sha, which is not reachable from origin/main."
            exit 1
          fi

          ci_run_url="$(
            gh api "repos/$REPOSITORY/actions/workflows/ci.yaml/runs" \
              --method GET \
              -f branch=main \
              -f event=push \
              -f head_sha="$tagged_sha" \
              -f status=completed \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .html_url' |
              head -n 1
          )"
          if [ -z "$ci_run_url" ]; then
            echo "::error::Release commit $tagged_sha does not have a successful completed ci.yaml push run on main."
            exit 1
          fi

          echo "Release commit $tagged_sha is on main and passed CI: $ci_run_url"
      - uses: docker/setup-buildx-action@v4
      - uses: azure/setup-helm@v5
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
      - name: Lint chart
        run: make chart-lint
      - name: Render chart
        run: make chart-template
      - name: Package chart
        run: |
          helm package charts/dbclaim-operator \
            --version "${{ steps.version.outputs.chart_version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination dist
      - name: Push chart
        run: helm push "dist/dbclaim-operator-${{ steps.version.outputs.chart_version }}.tgz" "${CHART_REPOSITORY}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub release $VERSION already exists."
            exit 0
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --verify-tag
